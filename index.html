<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=1920, height=1080">

<style>
html, body {
    margin: 0;
    width: 1920px;
    height: 1080px;
    overflow: hidden;
    background: black;
    font-family: Arial, Helvetica, sans-serif;
}

/* VIDEO */
#video {
    position: absolute;
    top: 0;
    left: 0;
    width: 1920px;
    height: 1080px;
    border: 0;
}

/* LOGO */
#logo {
    position: absolute;
    bottom: 30px;
    left: 30px;
    width: 500px;
    z-index: 10;
}

/* LIVE VIEW */
#liveText {
    position: absolute;
    top: 30px;
    right: 40px;
    z-index: 20;

    color: white;
    font-size: 42px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 2px;

    text-shadow: 2px 2px 6px rgba(0,0,0,0.8);
}

/* CENTER ROTATING TEXT */
#rotatingText {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);

    width: 1400px;

    color: white;
    font-size: 78px;
    font-weight: 800;
    text-transform: uppercase;
    letter-spacing: 2px;
    text-align: center;
    line-height: 1.2;

    text-shadow: 3px 3px 10px rgba(0,0,0,0.85);

    z-index: 20;

    opacity: 1;
    transition: opacity 0.8s ease;
}
</style>
</head>

<body>

<!-- VIDEO -->
<iframe
    id="video"
    src="https://www.youtube.com/embed/4R7X2luK25M?autoplay=1&mute=1&controls=0&rel=0&modestbranding=1&playsinline=1"
    allow="autoplay; fullscreen"
    allowfullscreen>
</iframe>

<!-- LOGO -->
<img id="logo" src="logo.png">

<!-- LIVE VIEW -->
<div id="liveText">LIVE VIEW</div>

<!-- ROTATING TEXT -->
<div id="rotatingText"></div>

<script>
/* ROTATING PHRASES */
const phrases = [
    "Explore. Experience. Excel",
    "Our tuition is 24% lower than the national average for public universities",
    "Get individualized attention to help you succeed and thrive — no matter your goals.",
    "We offer one-of-a-kind programs, small class sizes, and top-ranked online learning to prepare you for the road ahead."
];

let currentPhrase = 0;
const textElement = document.getElementById("rotatingText");

function showPhrase() {
    textElement.style.opacity = 0;

    setTimeout(() => {
        textElement.innerHTML = phrases[currentPhrase];
        textElement.style.opacity = 1;

        currentPhrase = (currentPhrase + 1) % phrases.length;
    }, 800);
}

showPhrase();
setInterval(showPhrase, 8000);
</script>

</body>
</html>
