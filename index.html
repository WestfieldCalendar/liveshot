<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=1920, height=1080">

<style>
html, body {
    margin: 0;
    width: 1920px;
    height: 1080px;
    overflow: hidden;
    background: black;
}

#video {
    position: absolute;
    top: 0;
    left: 0;
    width: 1920px;
    height: 1080px;
    border: 0;
}

#logo {
    position: absolute;
    bottom: 30px;
    left: 30px;
    width: 500px;
    z-index: 10;
}
</style>
</head>

<body>

<iframe
    id="video"
    src="https://www.youtube.com/embed/hGUCcDJco2Q?autoplay=1&mute=1&controls=0&rel=0&modestbranding=1&playsinline=1"
    allow="autoplay; fullscreen"
    allowfullscreen>
</iframe>

<img id="logo" src="logo.png">

</body>
</html>
