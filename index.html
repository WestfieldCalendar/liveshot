<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=1920, height=1080">

<style>
html, body {
    margin: 0;
    width: 1920px;
    height: 1080px;
    overflow: hidden;
    background: black;
    font-family: Arial, Helvetica, sans-serif;
}

#video {
    position: absolute;
    top: 0;
    left: 0;
    width: 1920px;
    height: 1080px;
    border: 0;
}

#logo {
    position: absolute;
    bottom: 30px;
    left: 30px;
    width: 500px;
    z-index: 10;
}

/* LIVE VIEW text */
#liveText {
    position: absolute;
    top: 30px;
    right: 40px;
    z-index: 20;

    color: white;
    font-size: 42px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 2px;

    text-shadow: 2px 2px 6px rgba(0,0,0,0.8);
}

/* Date + Time */
#clock {
    position: absolute;
    bottom: 40px;
    right: 40px;
    z-index: 20;

    color: white;
    font-size: 34px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 1px;
    text-align: right;

    text-shadow: 2px 2px 6px rgba(0,0,0,0.8);
}
</style>
</head>

<body>

<iframe
    id="video"
    src="https://www.youtube.com/embed/4R7X2luK25M?autoplay=1&mute=1&controls=0&rel=0&modestbranding=1&playsinline=1"
    allow="autoplay; fullscreen"
    allowfullscreen>
</iframe>

<img id="logo" src="logo.png">

<div id="liveText">LIVE VIEW</div>

<div id="clock"></div>

<script>
function updateClock() {
    const now = new Date();

    const options = {
        weekday: 'short',
        month: 'short',
        day: 'numeric',
        year: 'numeric',
        hour: 'numeric',
        minute: '2-digit',
        second: '2-digit'
    };

    const formatted = now.toLocaleString('en-US', options);

    document.getElementById('clock').innerHTML = formatted;
}

updateClock();
setInterval(updateClock, 1000);
</script>

</body>
</html>
