<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=1920, height=1080, initial-scale=1.0">

<title>Westfield Live Stream</title>

<style>
html, body {
    margin: 0;
    padding: 0;
    width: 1920px;
    height: 1080px;
    overflow: hidden;
    background: black;
}

/* Fullscreen stream */
#stream {
    position: absolute;
    top: 0;
    left: 0;
    width: 1920px;
    height: 1080px;
    border: 0;
}

/* Logo overlay */
#logo {
    position: absolute;
    bottom: 30px;
    left: 30px;
    width: 220px;
    z-index: 10;
    pointer-events: none;
}
</style>
</head>

<body>

<!-- WebRTC (MediaMTX) -->
<iframe
    id="stream"
    src="https://207.159.162.139:8889/cam1?autoplay=true&muted=true"
    allow="autoplay; fullscreen"
    scrolling="no">
</iframe>

<img id="logo" src="logo.png" alt="Logo">

</body>
</html>
