<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=1920, height=1080, initial-scale=1.0">

<title>Westfield Live Stream</title>

<style>
html, body {
    margin: 0;
    padding: 0;
    width: 1920px;
    height: 1080px;
    overflow: hidden;
    background: black;
    font-family: Arial, sans-serif;
}

/* Video background */
#video {
    position: absolute;
    top: 0;
    left: 0;
    width: 1920px;
    height: 1080px;
    object-fit: cover;
}


/* Bottom-left logo */
#logo {
    position: absolute;
    bottom: 30px;
    left: 30px;
    width: 220px;
}


</style>
</head>

<body>

<video id="video" autoplay muted playsinline></video>

<div id="dim"></div>

<img id="logo" src="logo.png" alt="Logo">



<script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>

<script>
const video = document.getElementById('video');
const streamURL = "http://207.159.162.139:8888/cam1/index.m3u8";

if (Hls.isSupported()) {
    const hls = new Hls({
        lowLatencyMode: true
    });

    hls.loadSource(streamURL);
    hls.attachMedia(video);
}
else if (video.canPlayType('application/vnd.apple.mpegurl')) {
    video.src = streamURL;
}
</script>

</body>
</html>
