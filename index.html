<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=1920, height=1080">

<!-- SOURCE SERIF 4 -->
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<link href="https://fonts.googleapis.com/css2?family=Source+Serif+4:ital,wght@1,700&display=swap" rel="stylesheet">

<style>
html, body {
    margin: 0;
    width: 1920px;
    height: 1080px;
    overflow: hidden;
    background: black;
}

/* VIDEO + CAMPUS IMAGE */
#video,
#campusImage {
    position: absolute;
    top: 0;
    left: 0;
    width: 1920px;
    height: 1080px;
    border: 0;
    object-fit: cover;
}

/* CAMPUS IMAGE HIDDEN BY DEFAULT */
#campusImage {
    display: none;
    z-index: 5;
}

/* OVERLAY IMAGE ROTATOR */
.overlayImage {
    position: absolute;
    top: 0;
    left: 0;
    width: 1920px;
    height: 1080px;
    object-fit: cover;

    z-index: 15;

    opacity: 0;
    transition: opacity 1s ease-in-out;
}

/* ACTIVE OVERLAY */
.overlayImage.active {
    opacity: 1;
}

/* LOGO */
#logo {
    position: absolute;
    bottom: 30px;
    left: 30px;
    width: 500px;
    z-index: 20;
}

/* LIVE VIEW */
#liveText {
    position: absolute;
    top: 30px;
    right: 40px;
    z-index: 20;

    color: white;
    font-family: "Source Serif 4", Georgia, serif;
    font-style: italic;
    font-size: 42px;
    font-weight: 700;
    letter-spacing: 1px;

    text-shadow: 2px 2px 6px rgba(0,0,0,0.8);
}
</style>
</head>

<body>

<!-- LIVE VIDEO -->
<iframe
    id="video"
    src="https://www.youtube.com/embed/_Fc2MV_398U?autoplay=1&mute=1&controls=0&rel=0&modestbranding=1&playsinline=1&live=1&enablejsapi=1"
    allow="autoplay; fullscreen"
    allowfullscreen>
</iframe>

<!-- NIGHTTIME CAMPUS IMAGE -->
<img id="campusImage" src="campus.png">

<!-- OVERLAY IMAGES -->
<img class="overlayImage active" src="academic.png">
<img class="overlayImage" src="dedicate.png">
<img class="overlayImage" src="explore.png">
<img class="overlayImage" src="smart.png">

<!-- LOGO -->
<img id="logo" src="logo.png">

<!-- LIVE VIEW -->
<div id="liveText">Live View</div>

<script>
/* IMAGE ROTATION */
const images = document.querySelectorAll(".overlayImage");

let currentImage = 0;

function rotateImages() {
    images[currentImage].classList.remove("active");

    currentImage = (currentImage + 1) % images.length;

    images[currentImage].classList.add("active");
}

setInterval(rotateImages, 8000);

/* DAY/NIGHT SWITCH */
function updateDisplayMode() {
    const now = new Date();

    /* Eastern Time */
    const estHour = new Intl.DateTimeFormat('en-US', {
        timeZone: 'America/New_York',
        hour: 'numeric',
        hour12: false
    }).format(now);

    const hour = parseInt(estHour);

    const video = document.getElementById("video");
    const campusImage = document.getElementById("campusImage");
    const liveText = document.getElementById("liveText");

    /* 7 PM - 7 AM */
    if (hour >= 19 || hour < 7) {
        video.style.display = "none";
        campusImage.style.display = "block";
        liveText.style.display = "none";
    } else {
        video.style.display = "block";
        campusImage.style.display = "none";
        liveText.style.display = "block";
    }
}

/* CHECK IMMEDIATELY */
updateDisplayMode();

/* CHECK EVERY MINUTE */
setInterval(updateDisplayMode, 60000);
</script>

</body>
</html>
