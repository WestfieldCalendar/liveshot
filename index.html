<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=1920, height=1080">

<style>
html, body {
    margin: 0;
    width: 1920px;
    height: 1080px;
    overflow: hidden;
    background: black;
}

video {
    position: absolute;
    width: 100%;
    height: 100%;
    object-fit: cover;
}

#logo {
    position: absolute;
    bottom: 30px;
    left: 30px;
    width: 220px;
    z-index: 10;
}
</style>
</head>

<body>

<video id="video" autoplay muted playsinline></video>

<img id="logo" src="logo.png">

<script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>

<script>
const video = document.getElementById('video');
const streamURL = "http://207.159.162.139:8888/cam1/index.m3u8";

if (Hls.isSupported()) {
    const hls = new Hls({
        lowLatencyMode: true
    });

    hls.loadSource(streamURL);
    hls.attachMedia(video);

    hls.on(Hls.Events.MANIFEST_PARSED, () => {
        video.play();
    });

} else if (video.canPlayType('application/vnd.apple.mpegurl')) {
    video.src = streamURL;
    video.addEventListener('loadedmetadata', () => video.play());
}
</script>

</body>
</html>
